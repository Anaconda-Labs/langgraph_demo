name: Update Status (Owner Certification)

"on":
  workflow_dispatch:
    inputs:
      tested:
        description: 'I confirm I have run this resource end-to-end and it works correctly'
        type: boolean
        required: true

jobs:
  update-registry:
    name: Record successful test
    runs-on: ubuntu-latest
    if: ${{ inputs.tested == true }}
    env:
      REGISTRY_OWNER: ${{ vars.REGISTRY_OWNER || 'Anaconda-Labs' }}
      REGISTRY_REPO: ${{ vars.REGISTRY_REPO || 'resource-registry' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REGISTRY_TOKEN }}

      - name: Update last_tested date in registry via PR
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          REPO_NAME: ${{ github.event.repository.name }}
          ORG_NAME: ${{ github.event.repository.owner.login }}
          REGISTRY_OWNER: ${{ vars.REGISTRY_OWNER || 'Anaconda-Labs' }}
          REGISTRY_REPO: ${{ vars.REGISTRY_REPO || 'resource-registry' }}
        run: |
          python - << 'EOF'
          import requests, os, yaml, base64, json
          from datetime import datetime

          token = os.environ['REGISTRY_TOKEN']
          repo_name = os.environ['REPO_NAME']
          org_name = os.environ['ORG_NAME']
          today = datetime.today().strftime('%Y-%m-%d')

          # Determine registry repo location from environment variables
          REGISTRY_OWNER = os.environ['REGISTRY_OWNER']
          REGISTRY_REPO = os.environ['REGISTRY_REPO']

          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
          }

          # Get default branch SHA
          repo_url = f'https://api.github.com/repos/{REGISTRY_OWNER}/{REGISTRY_REPO}'
          repo_r = requests.get(repo_url, headers=headers)
          repo_r.raise_for_status()
          default_branch = repo_r.json()['default_branch']

          branch_url = f'{repo_url}/git/refs/heads/{default_branch}'
          branch_r = requests.get(branch_url, headers=headers)
          branch_r.raise_for_status()
          base_sha = branch_r.json()['object']['sha']
          print(f"Base branch: {default_branch}, SHA: {base_sha}")

          # Fetch current registry.yml
          url = f'https://api.github.com/repos/{REGISTRY_OWNER}/{REGISTRY_REPO}/contents/registry.yml'
          r = requests.get(url, headers=headers)
          r.raise_for_status()
          file_info = r.json()
          content = base64.b64decode(file_info['content']).decode('utf-8')
          file_sha = file_info['sha']

          data = yaml.safe_load(content)

          # Find and update this resource
          updated = False
          status_changed = False
          for resource in data['resources']:
              if resource['repo'] == repo_name and resource['org'] == org_name:
                  old_status = resource.get('status')
                  resource['last_tested'] = today
                  if resource['status'] == 'needs_review':
                      resource['status'] = 'active'
                      resource['status_since'] = today
                      status_changed = True
                  updated = True
                  print(f"Updated {org_name}/{repo_name} last_tested to {today}")
                  if status_changed:
                      print(f"Status changed from {old_status} to active")
                  break

          if not updated:
              print(f"Warning: {org_name}/{repo_name} not found in registry")
              exit(1)

          # Create a new branch
          branch_name = f'update-status/{repo_name}-{today}'
          create_branch_url = f'{repo_url}/git/refs'
          create_branch_r = requests.post(create_branch_url, headers=headers, json={
              'ref': f'refs/heads/{branch_name}',
              'sha': base_sha,
          })

          # Check if branch already exists
          if create_branch_r.status_code == 422:
              print(f"Branch {branch_name} already exists, using existing branch")
          elif create_branch_r.status_code != 201:
              print(f"Failed to create branch: {create_branch_r.status_code}")
              print(create_branch_r.json())
              exit(1)
          else:
              print(f"Created branch: {branch_name}")

          # Commit updated registry.yml to the new branch
          new_content = yaml.dump(data, default_flow_style=False, sort_keys=False, allow_unicode=True)
          commit_message = f'chore: update last_tested for {repo_name} ({today})'
          if status_changed:
              commit_message = f'chore: update status to active and last_tested for {repo_name} ({today})'

          commit_url = f'{url}?ref={branch_name}'
          commit_r = requests.put(commit_url, headers=headers, json={
              'message': commit_message,
              'content': base64.b64encode(new_content.encode()).decode(),
              'sha': file_sha,
              'branch': branch_name,
          })

          if commit_r.status_code not in (200, 201):
              print(f"Failed to commit: {commit_r.status_code}")
              print(commit_r.json())
              exit(1)

          print(f"Committed changes to branch {branch_name}")

          # Create pull request
          pr_url = f'{repo_url}/pulls'
          pr_title = f'Update status for {repo_name}'
          pr_body = "## Owner Certification Update\n\n"
          pr_body += f"Resource: __{org_name}/{repo_name}__\n"
          pr_body += f"Date: __{today}__\n\n"
          pr_body += "### Changes:\n"
          pr_body += f"- Updated `last_tested` to {today}\n"
          if status_changed:
              pr_body += "- Changed status from `needs_review` to `active`\n"

          pr_body += "\n### Certification\n\n"
          pr_body += "This PR was automatically created by the owner certification workflow after the resource owner confirmed they have run the resource end-to-end and it works correctly.\n\n"
          pr_body += f"__Workflow run:__ https://github.com/{org_name}/{repo_name}/actions/runs/{os.environ.get('GITHUB_RUN_ID', 'unknown')}\n"

          pr_r = requests.post(pr_url, headers=headers, json={
              'title': pr_title,
              'body': pr_body,
              'head': branch_name,
              'base': default_branch,
          })

          if pr_r.status_code == 201:
              pr_data = pr_r.json()
              print(f"Created PR: {pr_data['html_url']}")
              print(f"PR #{pr_data['number']}")

              # Save PR URL for next step
              with open('/tmp/pr_url.txt', 'w') as f:
                  f.write(pr_data['html_url'])
          elif pr_r.status_code == 422:
              # PR might already exist
              error_msg = pr_r.json().get('errors', [{}])[0].get('message', '')
              if 'already exists' in error_msg.lower():
                  print(f"PR already exists for branch {branch_name}")
                  # Find the existing PR
                  list_pr_r = requests.get(f"{pr_url}?head={REGISTRY_OWNER}:{branch_name}", headers=headers)
                  if list_pr_r.status_code == 200 and len(list_pr_r.json()) > 0:
                      existing_pr = list_pr_r.json()[0]
                      print(f"Existing PR: {existing_pr['html_url']}")
                      with open('/tmp/pr_url.txt', 'w') as f:
                          f.write(existing_pr['html_url'])
              else:
                  print(f"Failed to create PR: {pr_r.status_code}")
                  print(pr_r.json())
                  exit(1)
          else:
              print(f"Failed to create PR: {pr_r.status_code}")
              print(pr_r.json())
              exit(1)
          EOF

      - name: Update local status badge and README
        run: |
          # Update badge JSON
          mkdir -p .github/badges
          echo '{"schemaVersion":1,"label":"status","message":"active","color":"brightgreen"}' \
            > .github/badges/status.json

          # Update README with cache-busting timestamp
          TIMESTAMP=$(date +%s)
          sed -i.bak "s|status\.json?[0-9]*&cacheSeconds|status.json?${TIMESTAMP}\&cacheSeconds|g" README.md
          rm README.md.bak

      - name: Commit badge and README update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/status.json README.md
          git diff --staged --quiet || git commit -m "chore: update status badge to active [skip ci]"
          git push

      - name: Comment with PR link
        if: success()
        run: |
          if [ -f /tmp/pr_url.txt ]; then
            PR_URL=$(cat /tmp/pr_url.txt)
            echo "✅ Certification workflow completed successfully!"
            echo ""
            echo "A pull request has been created to update the registry:"
            echo "$PR_URL"
            echo ""
            echo "The PR needs to be reviewed and merged to complete the certification process."
          fi
